version: 2
updates:
  - package-ecosystem: "npm" # Dependabot supports pnpm workspaces/projects via the npm ecosystem
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
